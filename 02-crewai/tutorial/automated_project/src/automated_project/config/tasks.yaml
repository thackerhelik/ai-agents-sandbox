task_breakdown:
  description: >
    Carefully analyze the project requirements for the {project_type} project and 
    break them down into individual tasks. Define each task's scope in detail, set 
    achievable timelines, and ensure that all dependencies are accounted for:

    Project Requirements:
    {project_requirements}

    Team members:
    {team_members}
  expected_output: >
    A comprehensive list of tasks with detailed descriptions, timelines, dependencies, and 
    deliverables. Ensure the list is clearly formatted for the next agent to read.
  agent: project_planning_agent

time_resource_estimation:
  description: >
    Thoroughly evaluate each task in the {project_type} project to estimate the time, resources, 
    and effort required. Use historical data, task complexity, and available resources to 
    provide a realistic estimation for each task. 
  expected_output: >
    A detailed estimation report outlining the time, resources, and effort required for each task 
    in the {project_type} project. Your financial report MUST include a summary of any risks or 
    uncertainties associated with estimations.
  agent: estimation_agent

resource_allocation:
  description: >
    Strategically allocate tasks for the {project_type} project to team members based on their skills, 
    availability, and current workload. Ensure that each task is assigned to the most suitable team 
    member and that the workload is evenly distributed.

    Team members:
    {team_members}
  expected_output: >
    You must format your final output strictly as the requested Pydantic JSON schema. 
    The JSON must contain a list of tasks (with task name, estimated hours, and assigned resources) 
    and a list of major project milestones. Do not include any conversational text outside the JSON.
  agent: resource_allocation_agent